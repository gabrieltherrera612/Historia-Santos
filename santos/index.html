<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Histograma de Santos y Apariciones</title>
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #timeline { width: 100%; height: 210px; border: 1px solid #ccc; border-radius: 10px; margin-top: 15px; }
    #detalle { margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; background: #f9f9f9; overflow: hidden;text-align: justify; }
    .filtros, .busqueda { margin-bottom: 15px; }
    label { margin-right: 15px; }
    input[type="text"] { padding: 5px; width: 250px; }
    img.lazy { max-width: 200px; float: left; margin-right: 15px; display: block; }
  </style>
</head>
<body>

  <h1>📜 Línea de Tiempo: Jesús, Virgen y Santos</h1>

  <!-- Filtros -->
  <div class="filtros">
    <label><input type="checkbox" id="filtro-jesus" checked> Jesús</label>
    <label><input type="checkbox" id="filtro-virgen" checked> Virgen</label>
    <label><input type="checkbox" id="filtro-santo" checked> Santos</label>
  </div>

  <!-- Buscador -->
  <div class="busqueda">
    <input type="text" id="buscar" placeholder="🔎 Buscar evento (ej: Guadalupe)">
    <button onclick="buscarEvento()">Buscar</button>
  </div>

  <div id="timeline"></div>
  <div id="detalle">Haz clic en un evento para ver los detalles aquí.</div>

  <script>
    const container = document.getElementById("timeline");
    const detalle = document.getElementById("detalle");
    let timeline, dataset, eventos;

    const colores = { "Jesus": "#ff6666", "Virgen": "#66b3ff", "Santo": "#66cc66" };

    function renderizar() {
      const filtroJesus = document.getElementById("filtro-jesus").checked;
      const filtroVirgen = document.getElementById("filtro-virgen").checked;
      const filtroSanto = document.getElementById("filtro-santo").checked;

      const items = eventos
      
        .filter(e =>
          (e.categoria === "Jesus" && filtroJesus) ||
          (e.categoria === "Virgen" && filtroVirgen) ||
          (e.categoria === "Santo" && filtroSanto)
        )
        .map((evento) => ({
        id: evento.start + "_" + evento.title,  // un identificador único
        content: evento.title,
        start: evento.start,
        style: `background-color:${colores[evento.categoria]}; color:white; border-radius:5px; padding:3px;`,
        title: evento.tooltip,
        eventoRef: evento   // 👈 guardamos el objeto completo aquí
      }));

      dataset = new vis.DataSet(items);
      timeline.setItems(dataset);
    }

    function buscarEvento() {
      const palabra = document.getElementById("buscar").value.toLowerCase();
      const encontrado = eventos.find(e =>
        e.title.toLowerCase().includes(palabra) || e.content.toLowerCase().includes(palabra)
      );

      if (encontrado) {
        timeline.moveTo(new Date(encontrado.start));
        mostrarDetalle(encontrado);
      } else {
        alert("No se encontró ningún evento con esa palabra clave.");
      }
    }

    function mostrarDetalle(evento) {
      detalle.innerHTML = `
        <h2>${evento.title}</h2>
        <img class="lazy" data-src="${evento.img}" alt="${evento.title}">
        <div>${evento.content}</div>
        <p><b>Fecha:</b> ${evento.start}</p>
        <p><b>Categoría:</b> ${evento.categoria}</p>
        ${evento.fuente ? `<p><b>Fuente:</b> <a href="${evento.fuente}" target="_blank">Ver más</a></p>` : ""}
      `;

      // Lazy load manual
      const img = detalle.querySelector('img.lazy');
      if (img) {
        img.src = img.dataset.src;
      }
    }
    

    fetch("eventos.json")

    
    
      .then(response => response.json())
      .then(data => {
        eventos = data;

        const options = {
          editable: false,
          margin: { item: 20 },
          horizontalScroll: true,
          zoomable: true,
          moveable: true,
          start: new Date(1050,0,1),
          end: new Date(1950,11,31),
          zoomMin: 1000*60*60*24*365*10,  // mínimo 10 años
          zoomMax: 1000*60*60*24*365*1000,
          format: { minorLabels:{year:'YYYY'}, majorLabels:{year:'YYYY'} }
        };

        timeline = new vis.Timeline(container, [], options);

        renderizar();

        timeline.on("select", function(props){
          if (props.items.length > 0) {
            const item = dataset.get(props.items[0]); // obtenemos el item desde DataSet
            mostrarDetalle(item.eventoRef);          // usamos el evento original
          }
        });

        document.getElementById("filtro-jesus").addEventListener("change", renderizar);
        document.getElementById("filtro-virgen").addEventListener("change", renderizar);
        document.getElementById("filtro-santo").addEventListener("change", renderizar);
      })
      .catch(err => console.error("Error cargando eventos:", err));
      
  </script>

</body>
</html>
